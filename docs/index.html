<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐕 Black Dog FX Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #0d0d1a 0%, #111128 100%);
      border-bottom: 1px solid #1e1e3a;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .header-left h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.5px;
    }

    .header-left p {
      font-size: 0.78rem;
      color: #888;
      margin-top: 2px;
    }

    .header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .last-updated {
      font-size: 0.78rem;
      color: #aaa;
    }

    .refresh-bar {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .refresh-label {
      font-size: 0.72rem;
      color: #666;
    }

    .countdown {
      font-size: 0.78rem;
      font-weight: 700;
      color: #4caf8a;
      min-width: 28px;
      text-align: right;
    }

    .progress-track {
      width: 100px;
      height: 3px;
      background: #1e1e3a;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #4caf8a, #2196f3);
      border-radius: 2px;
      transition: width 1s linear;
    }

    /* ── Summary bar ── */
    .summary-bar {
      display: flex;
      gap: 24px;
      padding: 10px 24px;
      background: #0d0d1a;
      border-bottom: 1px solid #151530;
      flex-wrap: wrap;
    }

    .summary-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
    }

    .summary-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
    }

    .dot-buy  { background: #4caf8a; }
    .dot-sell { background: #f44336; }
    .dot-wait { background: #555; }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      padding: 20px 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ── Pair Card ── */
    .card {
      background: #0f0f1e;
      border: 1px solid #1a1a35;
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .card.buy  { border-color: #1a3a2a; box-shadow: 0 0 0 1px #1a3a2a; }
    .card.sell { border-color: #3a1a1a; box-shadow: 0 0 0 1px #3a1a1a; }
    .card.wait { border-color: #1a1a35; }

    /* Card header strip */
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px 8px;
    }

    .pair-name {
      font-size: 1.2rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: 1px;
    }

    .direction-badge {
      font-size: 0.68rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }

    .direction-bull { background: rgba(76,175,138,0.15); color: #4caf8a; }
    .direction-bear { background: rgba(244,67,54,0.15);  color: #f44336; }

    /* Price */
    .price-row {
      padding: 0 16px 10px;
      font-size: 1rem;
      font-weight: 600;
      color: #c8c8d8;
      font-family: 'Courier New', monospace;
    }

    /* Signal badge */
    .signal-badge {
      margin: 0 16px 12px;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .signal-buy  { background: rgba(76,175,138,0.15); color: #4caf8a; border: 1px solid #1d4a35; }
    .signal-sell { background: rgba(244,67,54,0.12);  color: #f44336; border: 1px solid #4a1d1d; }
    .signal-wait { background: rgba(80,80,120,0.12);  color: #7878a8; border: 1px solid #252545; }

    /* Conditions */
    .conditions {
      padding: 0 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .condition-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.78rem;
    }

    .condition-label {
      color: #888;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .cond-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .cond-on  { background: #4caf8a; box-shadow: 0 0 5px rgba(76,175,138,0.5); }
    .cond-off { background: #2a2a3a; }

    .cond-value {
      font-size: 0.72rem;
      font-weight: 600;
    }

    .cond-value.on  { color: #4caf8a; }
    .cond-value.off { color: #444; }

    /* Progress dots at bottom */
    .conditions-meter {
      display: flex;
      justify-content: center;
      gap: 5px;
      padding: 8px 16px 14px;
      border-top: 1px solid #151530;
    }

    .meter-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #1e1e3a;
    }

    .meter-dot.filled { background: #4caf8a; }
    .meter-dot.filled.sell { background: #f44336; }

    /* Loading / error */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #555;
      font-size: 1rem;
      grid-column: 1 / -1;
    }

    .loading .spinner {
      font-size: 2rem;
      animation: spin 1.5s linear infinite;
      display: block;
      margin-bottom: 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    footer {
      text-align: center;
      padding: 20px;
      color: #333;
      font-size: 0.72rem;
      border-top: 1px solid #111125;
      margin-top: 20px;
    }

    /* Responsive */
    @media (max-width: 600px) {
      header { padding: 14px 16px; }
      .grid  { padding: 14px 12px; gap: 12px; }
      .summary-bar { padding: 8px 16px; gap: 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>🐕 Black Dog FX Dashboard</h1>
    <p>Bill Dow's System — 10 Major Pairs — Live Signals</p>
  </div>
  <div class="header-right">
    <span class="last-updated" id="last-updated">Loading...</span>
    <div class="refresh-bar">
      <span class="refresh-label">Refreshes in</span>
      <span class="countdown" id="countdown">60s</span>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:100%"></div>
      </div>
    </div>
  </div>
</header>

<div class="summary-bar" id="summary-bar">
  <span class="summary-item"><span class="summary-dot dot-wait"></span> Loading pairs...</span>
</div>

<div class="grid" id="grid">
  <div class="loading">
    <span class="spinner">🐕</span>
    Loading Black Dog signals...
  </div>
</div>

<footer>
  Black Dog FX System by Bill Dow &nbsp;·&nbsp; Signals update every 5 minutes &nbsp;·&nbsp; Dashboard refreshes every 60 seconds
</footer>

<script>
  const REFRESH_SECONDS = 60;
  let countdown = REFRESH_SECONDS;
  let timer;

  const CONDITION_LABELS = {
    trend:   { icon: "📊", label: "Trend Background" },
    channel: { icon: "📈", label: "Price vs Channel"  },
    macd:    { icon: "📉", label: "MACD (10-20-1)"    },
    mtf:     { icon: "🕐", label: "MTF MACD (1H)"     },
    ses:     { icon: "⚡", label: "SES Arrow"          },
  };

  const SIGNAL_CONFIG = {
    BUY:  { label: "🚀  BUY",  cls: "buy",  badge: "signal-buy",  dot: "" },
    SELL: { label: "💥  SELL", cls: "sell", badge: "signal-sell", dot: "sell" },
    WAIT: { label: "⏳  WAIT", cls: "wait", badge: "signal-wait", dot: "" },
  };

  async function fetchStatus() {
    try {
      const res  = await fetch(`status.json?t=${Date.now()}`);
      const data = await res.json();
      render(data);
    } catch (e) {
      document.getElementById("grid").innerHTML =
        `<div class="loading">⚠️ Could not load status.json.<br><small>Make sure the bot has run at least once.</small></div>`;
    }
  }

  function render(data) {
    // Header
    document.getElementById("last-updated").textContent =
      "Last data: " + (data.last_updated || "—");

    // Summary bar
    const pairs = data.pairs || [];
    const buys  = pairs.filter(p => p.signal === "BUY").length;
    const sells = pairs.filter(p => p.signal === "SELL").length;
    const waits = pairs.filter(p => p.signal === "WAIT").length;

    document.getElementById("summary-bar").innerHTML = `
      <span class="summary-item"><span class="summary-dot dot-buy"></span> ${buys} BUY signal${buys !== 1 ? "s" : ""}</span>
      <span class="summary-item"><span class="summary-dot dot-sell"></span> ${sells} SELL signal${sells !== 1 ? "s" : ""}</span>
      <span class="summary-item"><span class="summary-dot dot-wait"></span> ${waits} Waiting</span>
      <span class="summary-item" style="margin-left:auto;color:#555;font-size:0.75rem;">TF: ${data.timeframe || "—"} &nbsp;|&nbsp; MTF: ${data.mtf || "—"}</span>
    `;

    if (pairs.length === 0) {
      document.getElementById("grid").innerHTML =
        `<div class="loading"><span class="spinner">🐕</span>No pair data yet — waiting for the bot's first run.</div>`;
      return;
    }

    // Cards — BUY first, then SELL, then WAIT
    const sorted = [...pairs].sort((a, b) => {
      const order = { BUY: 0, SELL: 1, WAIT: 2 };
      return order[a.signal] - order[b.signal];
    });

    document.getElementById("grid").innerHTML = sorted.map(p => cardHTML(p)).join("");
  }

  function cardHTML(p) {
    const sig = SIGNAL_CONFIG[p.signal] || SIGNAL_CONFIG.WAIT;
    const isBull = p.direction === "BULL";
    const dirClass = isBull ? "direction-bull" : "direction-bear";
    const dirLabel = isBull ? "▲ BULL" : "▼ BEAR";

    // Condition rows
    const condRows = Object.entries(CONDITION_LABELS).map(([key, meta]) => {
      const on  = p.conditions?.[key] === true;
      const cls = on ? "on" : "off";
      const val = on
        ? (isBull ? "✓ YES" : "✓ YES")
        : "✗ NO";
      return `
        <div class="condition-row">
          <span class="condition-label">
            <span class="cond-dot ${on ? "cond-on" : "cond-off"}"></span>
            ${meta.icon} ${meta.label}
          </span>
          <span class="cond-value ${cls}">${val}</span>
        </div>`;
    }).join("");

    // Meter dots (1 per condition)
    const met = p.conditions_met || 0;
    const meterDots = [0,1,2,3,4].map(i =>
      `<div class="meter-dot ${i < met ? "filled " + sig.dot : ""}"></div>`
    ).join("");

    return `
      <div class="card ${sig.cls}">
        <div class="card-header">
          <span class="pair-name">${p.symbol}</span>
          <span class="direction-badge ${dirClass}">${dirLabel}</span>
        </div>
        <div class="price-row">${p.price}</div>
        <div class="signal-badge ${sig.badge}">${sig.label}</div>
        <div class="conditions">${condRows}</div>
        <div class="conditions-meter">
          ${meterDots}
          <span style="font-size:0.68rem;color:#444;margin-left:8px;">${met}/5 met</span>
        </div>
      </div>`;
  }

  // Auto-refresh countdown
  function tick() {
    countdown--;
    document.getElementById("countdown").textContent = countdown + "s";
    document.getElementById("progress-fill").style.width =
      ((countdown / REFRESH_SECONDS) * 100) + "%";

    if (countdown <= 0) {
      countdown = REFRESH_SECONDS;
      fetchStatus();
    }
  }

  // Start
  fetchStatus();
  timer = setInterval(tick, 1000);
</script>
</body>
</html>
